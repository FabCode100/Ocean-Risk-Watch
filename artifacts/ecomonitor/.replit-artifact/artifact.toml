kind = "web"
previewPath = "/"
title = "EcoMonitor SMPT"
version = "1.0.0"
id = "artifacts/ecomonitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24537
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ecomonitor run dev"

[services.env]
PORT = "24537"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ecomonitor", "run", "build"]
publicDir = "artifacts/ecomonitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
